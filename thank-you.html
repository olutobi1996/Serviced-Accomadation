<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — BJH Living</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:   #F0EDEA;
    --white:   #FAFAF9;
    --ink:     #111111;
    --mid:     #4A4845;
    --pale:    #E5E1DC;
    --accent:  #8C7B6B;
    --rule:    rgba(17,17,17,0.15);

    --display: 'Cormorant Garamond', Georgia, serif;
    --body:    'Inter', system-ui, sans-serif;

    --max: 1200px;
    --pad: clamp(1.5rem, 5vw, 4rem);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--body); background: var(--white); color: var(--ink); font-size: 16px; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }

  .container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }

  .eyebrow {
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); font-weight: 400; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 1rem; justify-content: center;
  }
  .eyebrow::before, .eyebrow::after { content: ''; flex: 0 0 2rem; height: 1px; background: var(--accent); }

  h1, h2, h3 { font-family: var(--display); font-weight: 400; line-height: 1.1; }
  h1 { font-size: clamp(2.6rem, 6vw, 4.5rem); }

  .rule { width: 3rem; height: 1px; background: var(--accent); margin: 1.5rem auto; }

  .btn-primary {
    display: inline-block; font-size: 0.75rem; letter-spacing: 0.15em;
    text-transform: uppercase; border: 1px solid var(--ink);
    padding: 0.9rem 2.2rem; color: var(--ink); background: transparent;
    transition: all 0.25s; font-weight: 400;
  }
  .btn-primary:hover { background: var(--ink); color: var(--white); }

  /* ─── THANK YOU HERO ─────────────────────────────────── */
  .thankyou-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    padding: 6rem var(--pad);
  }

  .thankyou-card {
    background: var(--white);
    border: 1px solid var(--rule);
    max-width: 560px;
    width: 100%;
    padding: 4rem 3rem;
    text-align: center;
  }

  .thankyou-icon {
    width: 64px; height: 64px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem;
  }

  .thankyou-icon svg { width: 26px; height: 26px; }

  .thankyou-card h1 {
    margin-bottom: 1rem;
    font-size: clamp(2rem, 4vw, 2.8rem);
  }

  .thankyou-card p {
    color: var(--mid);
    line-height: 1.8;
    max-width: 40ch;
    margin: 0 auto 2rem;
  }

  .thankyou-meta {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
  }

  .thankyou-meta a {
    color: var(--ink);
    border-bottom: 1px solid var(--rule);
  }

  .thankyou-meta a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .thankyou-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  @media (max-width: 600px) {
    .thankyou-card { padding: 3rem 1.75rem; }
  }
</style>
</head>
<body>

  <div class="thankyou-page">
    <div class="thankyou-card">

      <div class="thankyou-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <div class="eyebrow">Message Sent</div>
      <h1>Thank You</h1>
      <div class="rule"></div>

      <p>Your enquiry has been received. We aim to respond to all messages within 24 hours — we look forward to helping you find your perfect stay.</p>

      <div class="thankyou-actions">
        <a href="/" class="btn-primary">Back to Home</a>
      </div>

      <div class="thankyou-meta">
        Need something urgently? Email us at
        <a href="mailto:brycehosannah@bjhliving.com">brycehosannah@bjhliving.com</a>
        or call
        <a href="tel:+447717843702">07717 843702</a>
      </div>

    </div>
  </div>

</body>
</html>
